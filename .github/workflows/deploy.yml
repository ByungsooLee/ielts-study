name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  deploy-web:
    name: Deploy Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Cloudflare secrets
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN が未設定です。GitHub → Settings → Secrets and variables → Actions で登録してください。"
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID が未設定です。Cloudflare Dashboard 右サイドバーの Account ID を登録してください。"
            exit 1
          fi
          if [ "${#CLOUDFLARE_ACCOUNT_ID}" -ne 32 ]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID の長さが 32 文字ではありません（現在: ${#CLOUDFLARE_ACCOUNT_ID}）。余分な空白や改行が入っていないか確認してください。"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install and build web
        working-directory: web
        run: |
          npm ci
          npm run build
        env:
          GITHUB_SHA: ${{ github.sha }}

      - name: Ensure Pages production branch is main
        run: |
          RESP=$(curl -fsS -X PATCH \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/ielts-study" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"production_branch":"main"}')
          echo "$RESP" | grep -qE '"success"[[:space:]]*:[[:space:]]*true' || (echo "$RESP" && exit 1)
          echo "production_branch=main を設定しました"

      - name: Deploy to Cloudflare Pages (production branch)
        working-directory: web
        id: pages_deploy
        run: |
          set -o pipefail
          OUT=$(npx wrangler pages deploy dist \
            --project-name=ielts-study \
            --branch=main \
            --commit-hash="${{ github.sha }}" \
            --commit-message="Deploy ${{ github.sha }}" 2>&1 | tee /dev/stderr)
          DEPLOY_URL=$(echo "$OUT" | grep -oE 'https://[a-f0-9]+\.ielts-study\.pages\.dev' | tail -1)
          if [ -z "$DEPLOY_URL" ]; then
            echo "::error::wrangler のデプロイ URL を取得できませんでした"
            exit 1
          fi
          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $DEPLOY_URL"

      - name: Verify deployment artifact
        run: |
          DEPLOY_URL="${{ steps.pages_deploy.outputs.deploy_url }}"
          EXPECTED="${GITHUB_SHA:0:7}"
          VERSION=$(curl -fsS "${DEPLOY_URL}/version.json")
          echo "deployment version.json: $VERSION"
          echo "$VERSION" | grep -qE "\"version\"[[:space:]]*:[[:space:]]*\"${EXPECTED}\"" || \
            (echo "::error::デプロイ成果物の version が ${EXPECTED} と一致しません" && exit 1)
          echo "デプロイ成果物の検証に成功"

      - name: Wait for production alias to update
        run: |
          EXPECTED="${GITHUB_SHA:0:7}"
          for i in $(seq 1 12); do
            sleep 15
            VERSION=$(curl -fsS "https://ielts-study.pages.dev/version.json" || echo "{}")
            echo "attempt $i — production version.json: $VERSION"
            if echo "$VERSION" | grep -qE "\"version\"[[:space:]]*:[[:space:]]*\"${EXPECTED}\""; then
              echo "本番エイリアスの反映を確認しました"
              exit 0
            fi
          done
          echo "::warning::本番エイリアスが ${EXPECTED} に切り替わっていません。デプロイ自体は成功しています。Cloudflare の伝播を待つか、Deployments で Promote を確認してください。"

  deploy-worker:
    name: Deploy Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Cloudflare secrets
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN が未設定です。GitHub → Settings → Secrets and variables → Actions で登録してください。"
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID が未設定です。Cloudflare Dashboard 右サイドバーの Account ID を登録してください。"
            exit 1
          fi
          if [ "${#CLOUDFLARE_ACCOUNT_ID}" -ne 32 ]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID の長さが 32 文字ではありません（現在: ${#CLOUDFLARE_ACCOUNT_ID}）。余分な空白や改行が入っていないか確認してください。"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Install worker dependencies
        working-directory: worker
        run: npm ci

      - name: Deploy Worker
        working-directory: worker
        run: npx wrangler deploy
