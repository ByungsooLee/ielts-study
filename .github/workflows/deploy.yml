name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  deploy-web:
    name: Deploy Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Cloudflare secrets
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN が未設定です。GitHub → Settings → Secrets and variables → Actions で登録してください。"
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID が未設定です。Cloudflare Dashboard 右サイドバーの Account ID を登録してください。"
            exit 1
          fi
          if [ "${#CLOUDFLARE_ACCOUNT_ID}" -ne 32 ]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID の長さが 32 文字ではありません（現在: ${#CLOUDFLARE_ACCOUNT_ID}）。余分な空白や改行が入っていないか確認してください。"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install and build web
        working-directory: web
        run: |
          npm ci
          npm run build
        env:
          GITHUB_SHA: ${{ github.sha }}

      - name: Deploy to Cloudflare Pages
        working-directory: web
        run: npx wrangler pages deploy dist --project-name=ielts-study --commit-hash="${{ github.sha }}"

  deploy-worker:
    name: Deploy Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Cloudflare secrets
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN が未設定です。GitHub → Settings → Secrets and variables → Actions で登録してください。"
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID が未設定です。Cloudflare Dashboard 右サイドバーの Account ID を登録してください。"
            exit 1
          fi
          if [ "${#CLOUDFLARE_ACCOUNT_ID}" -ne 32 ]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID の長さが 32 文字ではありません（現在: ${#CLOUDFLARE_ACCOUNT_ID}）。余分な空白や改行が入っていないか確認してください。"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Install worker dependencies
        working-directory: worker
        run: npm ci

      - name: Deploy Worker
        working-directory: worker
        run: npx wrangler deploy
